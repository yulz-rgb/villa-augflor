<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villa Augflor — Private Villa, Pool & Designer Garden · Côte d'Azur · Book Direct</title>
<meta name="description" content="Private 3-bedroom villa with designer Mediterranean garden & pool. Between Nice, Antibes & Cannes. 15 min Nice Airport. Book direct and save 20%. From €480/night.">
<meta property="og:title" content="Villa Augflor — Côte d'Azur Villa with Pool & Garden">
<meta property="og:description" content="Private villa between Nice & Cannes. Designer garden, private pool, personal hosting. Book direct and save 20%.">
<meta property="og:image" content="https://www.villa-augflor.com/images/img_7247-3.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF8F3;--cream2:#F0EAD8;--ink:#1C1812;--inkm:rgba(28,24,18,.55);--inkf:rgba(28,24,18,.1);
  --gold:#B8924A;--goldl:rgba(184,146,74,.12);--terra:#C4673A;--sage:#7A9E7E;--white:#fff;
  --fd:'Cormorant Garamond',Georgia,serif;--fb:'Jost',sans-serif;--mw:1240px;
}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--cream);color:var(--ink);font-weight:300;line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* SCROLL PROGRESS */
.scroll-progress{position:fixed;top:0;left:0;height:2px;background:var(--gold);z-index:300;transition:width .08s linear;pointer-events:none}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:22px 48px;display:flex;align-items:center;justify-content:space-between;transition:background .4s,box-shadow .4s}
.nav.scrolled{background:rgba(250,248,243,.96);backdrop-filter:blur(14px);box-shadow:0 1px 0 var(--inkf)}
.nav-logo{font-family:var(--fd);font-size:22px;font-style:italic;font-weight:400;color:#fff;text-decoration:none;transition:color .4s;letter-spacing:.02em;cursor:pointer}
.nav.scrolled .nav-logo{color:var(--ink)}
.nav-links{display:flex;align-items:center;gap:26px}
.nav-link{font-size:11px;font-weight:400;letter-spacing:.13em;text-transform:uppercase;text-decoration:none;color:rgba(255,255,255,.8);transition:color .3s;position:relative}
.nav-link::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:1px;background:var(--gold);transform:scaleX(0);transition:transform .3s}
.nav-link:hover{color:var(--gold)!important}
.nav-link:hover::after{transform:scaleX(1)}
.nav.scrolled .nav-link{color:var(--inkm)}
.nav-cta{background:var(--gold);color:#fff!important;padding:10px 22px;border-radius:2px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;transition:background .2s,transform .15s}
.nav.scrolled .nav-cta{background:var(--ink)}
.nav-cta:hover{opacity:.88;transform:translateY(-1px)}
.lang-btn{font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:none;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.75);padding:5px 10px;cursor:pointer;border-radius:2px;font-family:var(--fb);transition:all .3s}
.nav.scrolled .lang-btn{border-color:var(--inkf);color:var(--inkm)}
.lang-btn:hover{border-color:var(--gold);color:var(--gold)!important}
.nav-hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px;flex-direction:column;gap:5px}
.nav-hamburger span{display:block;width:22px;height:1.5px;background:currentColor;transition:all .3s;transform-origin:center}
.nav-hamburger.open span:nth-child(1){transform:rotate(45deg) translate(4.7px,4.7px)}
.nav-hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.nav-hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(4.7px,-4.7px)}
.mobile-menu{position:fixed;inset:0;background:var(--ink);z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;transform:translateX(100%);transition:transform .45s cubic-bezier(.77,0,.18,1)}
.mobile-menu.open{transform:none}
.mobile-menu a{font-family:var(--fd);font-size:38px;font-style:italic;color:rgba(255,255,255,.8);text-decoration:none;font-weight:300;transition:color .2s;letter-spacing:.02em}
.mobile-menu a:hover{color:var(--gold)}
.mobile-menu .m-sub{font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.3);font-weight:400;margin-top:-12px}

/* HERO */
.hero{position:relative;height:100vh;min-height:680px;display:flex;align-items:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background-image:url('https://www.villa-augflor.com/images/img_7247-3.jpg');background-size:cover;background-position:center 45%;will-change:transform;transition:background-image .5s}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(105deg,rgba(18,13,7,.8) 0%,rgba(18,13,7,.45) 55%,rgba(18,13,7,.12) 100%)}
.hero-content{position:relative;z-index:2;padding:0 10vw;max-width:760px}
.hero-label{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:22px;font-weight:400}
.hero-title{font-family:var(--fd);font-size:clamp(48px,5.6vw,80px);font-weight:300;font-style:italic;color:#fff;line-height:1.07;margin-bottom:24px;text-shadow:0 2px 30px rgba(0,0,0,.2)}
.hero-title .line{display:block;overflow:visible;padding-bottom:.08em}
.hero-title .line span{display:block;animation:slideUp .9s cubic-bezier(.16,1,.3,1) both}
.hero-title .line:nth-child(2) span{animation-delay:.12s}
.hero-title .line:nth-child(3) span{animation-delay:.22s}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:none;opacity:1}}
.hero-sub{font-size:14px;color:rgba(255,255,255,.68);letter-spacing:.06em;margin-bottom:42px;font-weight:300;animation:fadeIn 1s .4s both}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.hero-actions{display:flex;gap:18px;align-items:center;flex-wrap:wrap;animation:fadeIn 1s .55s both}
.btn-primary{background:var(--gold);color:#fff;padding:15px 32px;font-family:var(--fb);font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;border-radius:2px;transition:background .2s,transform .2s,box-shadow .2s;display:inline-block;position:relative;overflow:hidden}
.btn-primary::after{content:'';position:absolute;top:50%;left:50%;width:0;height:0;background:rgba(255,255,255,.15);border-radius:50%;transform:translate(-50%,-50%);transition:width .5s,height .5s}
.btn-primary:hover{background:#a67e3a;transform:translateY(-1px);box-shadow:0 8px 24px rgba(184,146,74,.35)}
.btn-primary:active::after{width:400px;height:400px}
.btn-ghost{color:rgba(255,255,255,.8);font-size:13px;font-weight:300;text-decoration:none;letter-spacing:.06em;padding:15px 0;border-bottom:1px solid rgba(255,255,255,.28);transition:color .2s,border-color .2s}
.btn-ghost:hover{color:#fff;border-color:#fff}
.hero-scroll{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:6px;color:rgba(255,255,255,.4);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;animation:bounce 2.5s 1.5s infinite}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(7px)}}
.hero-scroll svg{width:18px}

/* TICKER */
.ticker{background:var(--gold);overflow:hidden;padding:11px 0;cursor:default}
.ticker-track{display:flex;width:max-content;animation:tick 30s linear infinite}
.ticker:hover .ticker-track{animation-play-state:paused}
.ticker-item{white-space:nowrap;padding:0 44px;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:#fff;font-weight:400;display:flex;align-items:center;gap:44px}
.ticker-item::after{content:'·';opacity:.5}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* TRUST BAR */
.trust-bar{background:var(--ink);display:flex;justify-content:center;flex-wrap:wrap}
.trust-item{padding:20px 38px;display:flex;flex-direction:column;align-items:center;gap:4px;border-right:1px solid rgba(255,255,255,.07)}
.trust-item:last-child{border-right:none}
.trust-num{font-family:var(--fd);font-size:26px;font-weight:400;color:var(--gold);line-height:1}
.trust-label{font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.42);font-weight:400}

/* SECTIONS */
section{padding:100px 0}
.container{max-width:var(--mw);margin:0 auto;padding:0 48px}
.section-label{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:14px;display:block}
.section-title{font-family:var(--fd);font-size:clamp(36px,3.8vw,58px);font-weight:300;line-height:1.1;color:var(--ink)}
.section-title em{font-style:italic}
.section-body{font-size:16px;line-height:1.9;color:var(--inkm);font-weight:300;max-width:600px;margin-top:20px}

/* REVEAL */
.reveal{opacity:0;transform:translateY(26px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1)}
.reveal.visible{opacity:1;transform:none}
.reveal.d1{transition-delay:.1s}.reveal.d2{transition-delay:.2s}.reveal.d3{transition-delay:.3s}.reveal.d4{transition-delay:.4s}

/* VILLA */
.villa-grid{display:grid;grid-template-columns:1fr 1fr;gap:90px;align-items:start}
.villa-copy{font-size:16.5px;line-height:1.95;color:var(--inkm);font-weight:300;margin:26px 0}
.villa-copy strong{color:var(--ink);font-weight:500}
.villa-features{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;margin-top:28px}
.feat{font-size:13px;color:var(--ink);font-weight:400;display:flex;align-items:center;gap:9px}
.feat-dot{width:3px;height:3px;background:var(--gold);border-radius:50%;flex-shrink:0}
.villa-img-stack{display:grid;grid-template-columns:1fr 1fr;gap:10px;position:sticky;top:100px}
.villa-img{width:100%;object-fit:cover;display:block;cursor:pointer;transition:opacity .3s,transform .5s}
.villa-img:hover{opacity:.9}
.villa-img-main{grid-column:1/-1;aspect-ratio:4/3}
.villa-img-side{aspect-ratio:3/4}
.villa-note{margin-top:28px;padding:18px 22px;border-left:2px solid var(--gold);background:var(--goldl);font-size:13.5px;color:var(--inkm);line-height:1.7}

/* PULL QUOTE */
.pullquote{background:var(--ink);text-align:center;padding:100px 48px}
.pq-stars{font-size:22px;color:var(--gold);letter-spacing:6px;margin-bottom:30px}
.pq-text{font-family:var(--fd);font-size:clamp(26px,3.2vw,46px);font-style:italic;font-weight:300;color:#fff;line-height:1.38;max-width:920px;margin:0 auto}
.pq-author{font-size:11.5px;color:rgba(255,255,255,.35);margin-top:32px;letter-spacing:.14em;text-transform:uppercase}

/* GALLERY */
.gallery-grid{columns:3;column-gap:10px;margin-top:48px}
.gallery-wrap{break-inside:avoid;margin-bottom:10px;overflow:hidden;cursor:pointer;position:relative}
.gallery-wrap::after{content:'';position:absolute;inset:0;background:rgba(18,13,7,0);transition:background .35s}
.gallery-wrap:hover::after{background:rgba(18,13,7,.18)}
.gallery-img{width:100%;display:block;transition:transform .55s cubic-bezier(.25,.46,.45,.94)}
.gallery-wrap:hover .gallery-img{transform:scale(1.05)}
.lightbox{position:fixed;inset:0;background:rgba(18,13,7,.97);z-index:1000;display:flex;align-items:center;justify-content:center}
.lb-img{max-width:90vw;max-height:88vh;object-fit:contain}
.lb-close{position:absolute;top:20px;right:24px;color:rgba(255,255,255,.5);font-size:32px;cursor:pointer;background:none;border:none;font-family:var(--fb);font-weight:200;line-height:1;transition:color .2s}
.lb-close:hover{color:#fff}
.lb-btn{position:absolute;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.45);font-size:50px;cursor:pointer;padding:20px;font-weight:100;font-family:var(--fb);transition:color .2s;line-height:1;user-select:none}
.lb-btn:hover{color:#fff}
.lb-prev{left:4px}.lb-next{right:4px}
.lb-label{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.35);white-space:nowrap}

/* EXPERIENCE TIMELINE */
.tl-section{background:var(--cream2)}
.tl-inner{display:grid;grid-template-columns:1fr 1fr;gap:90px;align-items:start}
.tl-items{margin-top:52px}
.tl-item{display:grid;grid-template-columns:72px 1fr;gap:24px;padding:22px 0;border-bottom:1px solid var(--inkf);cursor:default}
.tl-item:hover .tl-time{color:var(--terra)}
.tl-time{font-family:var(--fd);font-size:20px;color:var(--gold);font-style:italic;font-weight:300;padding-top:2px;transition:color .3s}
.tl-title{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:4px}
.tl-desc{font-size:13.5px;color:var(--inkm);font-weight:300;line-height:1.7}
.tl-img-wrap{position:sticky;top:120px;overflow:hidden;border-radius:2px}
.tl-img{width:100%;aspect-ratio:4/5;object-fit:cover}

/* LOCATION */
.loc-section{background:var(--ink)}
.loc-section .section-title{color:#fff}
.loc-section .section-label{color:var(--gold)}
.loc-inner{display:grid;grid-template-columns:1fr 1fr;gap:90px;align-items:center}
.loc-copy{color:rgba(255,255,255,.58);font-size:16px;line-height:1.85;font-weight:300;margin-top:22px}
.dest-list{margin-top:36px}
.dest{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.07);cursor:default;transition:border-color .3s}
.dest:hover{border-color:rgba(184,146,74,.4)}
.dest:hover .dest-name{color:#fff}
.dest-name{font-size:14px;color:rgba(255,255,255,.7);font-weight:300;transition:color .2s}
.dest-time{font-size:16px;color:var(--gold);font-style:italic;font-family:var(--fd);font-weight:300}

/* BOOK DIRECT */
.bd-inner{display:grid;grid-template-columns:1fr 1fr;gap:90px;align-items:center}
.bd-card{background:var(--cream2);padding:52px;border-radius:2px}
.bd-saving{font-family:var(--fd);font-size:80px;font-weight:300;line-height:1;color:var(--ink)}
.bd-saving-label{font-size:13px;color:var(--inkm);margin-top:6px;letter-spacing:.04em}
.bd-rows{margin-top:36px;display:flex;flex-direction:column;gap:14px}
.bd-row{display:flex;justify-content:space-between;font-size:14px}
.bd-row .rl{color:var(--inkm)}.bd-row .rv{font-weight:500;color:var(--ink)}
.bd-row.tot{padding-top:14px;border-top:1px solid var(--inkf)}
.bd-row.tot .rl{font-weight:500;color:var(--ink)}.bd-row.tot .rv{color:var(--gold);font-weight:500}
.bd-features{margin-top:32px;display:flex;flex-direction:column;gap:12px}
.bd-feat{display:flex;align-items:flex-start;gap:12px;font-size:14px;color:var(--inkm);line-height:1.6}
.bd-feat-icon{color:var(--gold);flex-shrink:0;font-size:14px;margin-top:3px}

/* HOW TO BOOK */
.htb-section{background:var(--ink)}
.htb-section .section-title{color:#fff}
.htb-section .section-label{color:var(--gold)}
.htb-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:48px;margin-top:60px}
.htb-step{position:relative}
.htb-num{font-family:var(--fd);font-size:80px;font-weight:300;color:var(--gold);line-height:1;opacity:.2}
.htb-title{font-size:19px;font-weight:500;color:#fff;margin-bottom:10px;margin-top:-10px}
.htb-desc{font-size:14px;color:rgba(255,255,255,.5);font-weight:300;line-height:1.75}
.htb-step-arrow{position:absolute;top:28px;right:-28px;color:rgba(184,146,74,.3);font-size:24px;font-weight:200}

/* LANA SECTION */
.lana-inner{display:grid;grid-template-columns:1fr 1fr;gap:90px;align-items:center}
.lana-img-col{position:relative}
.lana-img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block}
.lana-badge-float{position:absolute;bottom:24px;left:24px;background:var(--ink);color:#fff;padding:16px 22px;border-radius:2px;font-size:12px;line-height:1.6}
.lana-badge-float strong{display:block;font-family:var(--fd);font-size:20px;font-style:italic;font-weight:300;color:var(--gold)}
.lana-quote{font-family:var(--fd);font-size:clamp(22px,2.4vw,30px);font-style:italic;font-weight:300;line-height:1.48;color:var(--ink);margin:26px 0;border-left:2px solid var(--gold);padding-left:24px}
.lana-copy{font-size:15.5px;color:var(--inkm);font-weight:300;line-height:1.85;margin-bottom:28px}
.lana-sig{font-family:var(--fd);font-size:26px;font-style:italic;color:var(--gold);display:block;margin-bottom:8px}
.lana-sig-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--inkm);font-weight:400}
.lana-badges{display:flex;gap:10px;margin-top:28px;flex-wrap:wrap}
.lana-badge-item{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;padding:6px 14px;border:1px solid var(--inkf);border-radius:1px;color:var(--inkm);font-weight:400}

/* AVAILABILITY */
.avail-section{background:var(--cream2)}
.avail-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:52px;flex-wrap:wrap;gap:20px}
.scarcity{display:inline-flex;align-items:center;gap:8px;background:var(--terra);color:#fff;padding:8px 16px;border-radius:2px;font-size:11px;font-weight:500;letter-spacing:.06em;margin-bottom:14px}
.scarcity-pulse{width:7px;height:7px;background:#fff;border-radius:50%;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.75)}}
.avail-note{font-size:13px;color:var(--inkm);line-height:1.65;text-align:right}
.currency-toggle{display:flex;gap:5px;margin-top:10px;justify-content:flex-end}
.curr-btn{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;padding:5px 13px;border-radius:2px;border:1px solid var(--inkf);background:none;cursor:pointer;font-family:var(--fb);color:var(--inkm);transition:all .2s}
.curr-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.avail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.avail-month{background:var(--white);padding:28px 22px;border-radius:2px;transition:box-shadow .3s}
.avail-month:hover{box-shadow:0 8px 32px rgba(28,24,18,.1)}
.avail-mname{font-family:var(--fd);font-size:24px;font-weight:400;color:var(--ink);margin-bottom:3px}
.avail-mrate{font-size:11px;color:var(--gold);font-weight:400;letter-spacing:.06em;text-transform:uppercase;margin-bottom:18px}
.avail-weeks{display:flex;flex-direction:column;gap:5px}
.avail-week{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-radius:2px;font-size:12px;transition:all .2s;border:1px solid transparent;cursor:pointer}
.avail-week.av{background:#EFF7F2;color:#2A6B46;border-color:rgba(42,107,70,.1)}
.avail-week.av:hover{background:#2A6B46;color:#fff;border-color:#2A6B46;transform:translateX(2px)}
.avail-week.bk{background:#FAF0EE;color:#ccc;cursor:not-allowed;text-decoration:line-through}
.avail-week.sel{background:var(--gold);color:#fff;border-color:var(--gold)}
.avail-legend{display:flex;gap:18px;margin-top:24px;font-size:12px;color:var(--inkm);align-items:center;flex-wrap:wrap}
.legend-dot{width:10px;height:10px;border-radius:1px;flex-shrink:0}
.avail-panel{margin-top:22px;padding:22px;background:var(--ink);border-radius:2px;color:#fff;animation:fadeIn .3s}
.asp-week{font-size:10.5px;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.asp-price{font-family:var(--fd);font-size:34px;font-weight:300;color:#fff}
.asp-night{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:16px}
.asp-cta{display:block;background:var(--gold);color:#fff;text-align:center;text-decoration:none;padding:12px;font-size:10.5px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;border-radius:2px;transition:background .2s}
.asp-cta:hover{background:#a67e3a}

/* REVIEWS */
.reviews-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:52px}
.review-card{background:var(--cream2);padding:34px;border-radius:2px;transition:transform .3s,box-shadow .3s;cursor:default}
.review-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(28,24,18,.1)}
.review-stars{color:var(--gold);font-size:13px;letter-spacing:2px;margin-bottom:14px}
.review-text{font-family:var(--fd);font-size:18px;font-style:italic;font-weight:300;line-height:1.55;color:var(--ink);margin-bottom:18px}
.review-author{font-size:11px;color:var(--inkm);letter-spacing:.08em;text-transform:uppercase;font-weight:400}
.reviews-agg{display:flex;align-items:center;gap:36px;margin-top:50px;padding-top:46px;border-top:1px solid var(--inkf)}
.agg-score{font-family:var(--fd);font-size:80px;font-weight:300;line-height:1;color:var(--ink)}
.agg-right{display:flex;flex-direction:column;gap:5px}
.agg-stars{color:var(--gold);font-size:20px;letter-spacing:3px}
.agg-label{font-size:13px;color:var(--inkm)}
.agg-sub{font-size:12px;color:var(--inkm)}
.agg-link{margin-top:10px;font-size:11.5px;color:var(--gold);text-decoration:none;letter-spacing:.07em;text-transform:uppercase;font-weight:400;transition:opacity .2s}
.agg-link:hover{opacity:.7}

/* INSTAGRAM */
.ig-section{background:var(--cream2)}
.ig-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px}
.ig-handle{font-size:14px;color:var(--ink);font-weight:400}
.ig-handle span{color:var(--gold)}
.ig-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.ig-cell{aspect-ratio:1;overflow:hidden;cursor:pointer;position:relative}
.ig-cell img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .45s cubic-bezier(.25,.46,.45,.94)}
.ig-cell:hover img{transform:scale(1.07)}
.ig-cell::after{content:'';position:absolute;inset:0;background:rgba(18,13,7,0);transition:background .3s}
.ig-cell:hover::after{background:rgba(18,13,7,.22)}

/* FAQ */
.faq-list{margin-top:52px;max-width:840px}
.faq-item{border-bottom:1px solid var(--inkf)}
.faq-q{display:flex;justify-content:space-between;align-items:center;padding:22px 0;cursor:pointer;font-size:16px;font-weight:400;color:var(--ink);user-select:none;transition:color .2s}
.faq-q:hover{color:var(--gold)}
.faq-icon{font-size:24px;font-weight:200;color:var(--gold);flex-shrink:0;margin-left:20px;transition:transform .35s;line-height:1;width:24px;text-align:center}
.faq-icon.open{transform:rotate(45deg)}
.faq-a{font-size:15px;color:var(--inkm);line-height:1.85;padding-bottom:24px;font-weight:300;max-width:700px;animation:fadeIn .3s}

/* FINAL CTA */
.final-cta{background:var(--ink);text-align:center;padding:120px 48px}
.final-cta .section-title{color:#fff}
.final-cta .section-label{text-align:center}
.fc-body{font-size:18px;color:rgba(255,255,255,.5);max-width:520px;margin:22px auto 50px;font-weight:300;line-height:1.85;font-family:var(--fd);font-style:italic}
.fc-actions{display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
.btn-white{background:#fff;color:var(--ink);padding:15px 36px;font-family:var(--fb);font-size:11px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;text-decoration:none;border-radius:2px;transition:opacity .2s,transform .2s;display:inline-block}
.btn-white:hover{opacity:.88;transform:translateY(-1px)}
.btn-gold-outline{border:1px solid var(--gold);color:var(--gold);padding:15px 36px;font-family:var(--fb);font-size:11px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;text-decoration:none;border-radius:2px;transition:background .2s;display:inline-block}
.btn-gold-outline:hover{background:var(--goldl)}

/* FOOTER */
.footer{background:#110E08;padding:80px 0 36px}
.footer-inner{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;padding-bottom:48px;border-bottom:1px solid rgba(255,255,255,.07)}
.footer-brand{font-family:var(--fd);font-size:30px;font-style:italic;color:#fff;margin-bottom:14px;font-weight:300}
.footer-tag{font-size:13px;color:rgba(255,255,255,.38);font-weight:300;line-height:1.75;max-width:260px;margin-bottom:26px}
.footer-contact{font-size:13px;color:rgba(255,255,255,.42);line-height:2.1;font-weight:300}
.footer-contact a{color:var(--gold);text-decoration:none}
.footer-contact a:hover{text-decoration:underline}
.footer-h{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.28);font-weight:500;margin-bottom:18px}
.footer-links{list-style:none;display:flex;flex-direction:column;gap:9px}
.footer-links a{font-size:13px;color:rgba(255,255,255,.42);text-decoration:none;font-weight:300;transition:color .2s}
.footer-links a:hover{color:var(--gold)}
.footer-bottom{padding-top:28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer-copy{font-size:11px;color:rgba(255,255,255,.18)}
.footer-badges{font-size:11px;color:rgba(255,255,255,.22)}

/* STICKY WIDGET */
.sticky-widget{position:fixed;bottom:28px;right:28px;z-index:90;background:var(--ink);border-radius:3px;padding:20px 22px;width:268px;box-shadow:0 20px 60px rgba(0,0,0,.45);transition:transform .45s cubic-bezier(.34,1.56,.64,1),opacity .45s}
.sticky-widget.hidden{transform:translateY(130%);opacity:0;pointer-events:none}
.sw-avail{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;font-weight:400}
.sw-title{font-family:var(--fd);font-size:19px;font-style:italic;color:#fff;margin-bottom:3px;font-weight:300}
.sw-sub{font-size:11.5px;color:rgba(255,255,255,.42);margin-bottom:16px;font-weight:300}
.sw-btn{display:block;background:var(--gold);color:#fff;text-align:center;text-decoration:none;padding:11px;font-size:10.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;border-radius:2px;transition:background .2s}
.sw-btn:hover{background:#a67e3a}
.sw-x{position:absolute;top:10px;right:12px;background:none;border:none;color:rgba(255,255,255,.22);font-size:18px;cursor:pointer;line-height:1;transition:color .2s}
.sw-x:hover{color:rgba(255,255,255,.6)}

/* BACK TO TOP */
.btt{position:fixed;bottom:28px;left:28px;z-index:90;width:42px;height:42px;border-radius:50%;background:var(--ink);color:#fff;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(14px);transition:opacity .35s,transform .35s,background .2s;box-shadow:0 6px 20px rgba(0,0,0,.25)}
.btt.visible{opacity:1;transform:none}
.btt:hover{background:var(--gold)}

/* TWEAKS */
.tw-panel{position:fixed;bottom:100px;left:28px;z-index:200;background:#fff;border-radius:4px;padding:20px 22px;width:224px;box-shadow:0 12px 48px rgba(0,0,0,.18);font-family:var(--fb);transition:transform .35s,opacity .35s}
.tw-panel.hidden{transform:translateY(14px);opacity:0;pointer-events:none}
.tw-h{font-size:10.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);margin-bottom:16px}
.tw-row{margin-bottom:14px}
.tw-row label{display:block;font-size:10.5px;color:var(--inkm);margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
.tw-row select,.tw-row input[type=color]{width:100%;padding:6px 8px;border:1px solid var(--inkf);border-radius:2px;font-family:var(--fb);font-size:12px;color:var(--ink);background:var(--cream)}
.tw-row input[type=color]{height:34px;cursor:pointer;padding:3px}

/* RESPONSIVE */
@media(max-width:1100px){
  .villa-grid,.bd-inner,.loc-inner,.lana-inner,.footer-inner{grid-template-columns:1fr;gap:48px}
  .avail-grid{grid-template-columns:1fr 1fr}
  .reviews-grid{grid-template-columns:1fr 1fr}
  .villa-img-stack,.tl-img-wrap{position:static}
  .htb-steps{grid-template-columns:1fr}
  .htb-step-arrow{display:none}
  .tl-inner{grid-template-columns:1fr}
  .ig-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:768px){
  .nav{padding:16px 20px}
  .nav-links{display:none}
  .nav-hamburger{display:flex;color:rgba(255,255,255,.9)}
  .nav.scrolled .nav-hamburger{color:var(--ink)}
  .container{padding:0 22px}
  section{padding:70px 0}
  .gallery-grid{columns:2}
  .avail-grid{grid-template-columns:1fr}
  .reviews-grid{grid-template-columns:1fr}
  .sticky-widget{width:calc(100vw - 40px);right:20px;left:20px;bottom:20px}
  .btt{display:none}
  .ig-grid{grid-template-columns:repeat(3,1fr)}
  .avail-top{flex-direction:column;align-items:flex-start}
  .avail-note{text-align:left}
  .currency-toggle{justify-content:flex-start}
}
</style>
</head>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="helpers.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
